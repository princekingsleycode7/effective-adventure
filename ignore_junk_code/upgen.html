<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrPeptide — Report Generator (Firebase)</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --g: #4caf50;
            --g-light: #e8f5e9;
            --g-border: #c8e6c9;
            --font: 'Jost', 'Trebuchet MS', sans-serif;
            --bg: #f2f4f2;
            --white: #fff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --text: #222;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAV ── */
        .nav {
            background: var(--white);
            border-bottom: 2px solid var(--g);
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.07);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand-name {
            font-weight: 900;
            font-size: 16px;
            color: #1a1a1a;
            letter-spacing: 3px;
        }

        .badge {
            background: var(--g-light);
            color: var(--g);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        /* ── LAYOUT ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        /* ── FORMS ── */
        .lbl {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }

        .input {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            width: 100%;
            outline: none;
            font-family: var(--font);
            transition: all 0.2s;
            background: #fafafa;
        }

        .input:focus {
            border-color: var(--g);
            background: #fff;
            box-shadow: 0 0 0 3px var(--g-light);
        }

        textarea.input {
            height: 80px;
            resize: vertical;
        }

        fieldset {
            border: 1px solid var(--g-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            background: #fff;
        }

        legend {
            background: var(--g-light);
            color: var(--g);
            font-weight: 800;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* ── BUTTONS ── */
        .btn {
            background: var(--g);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #43a047;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-sec {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-sec:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #fdecea;
            color: #c62828;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-danger:hover {
            background: #fbc0bc;
        }

        /* ── DYNAMIC ROWS ── */
        .result-row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            align-items: center;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .result-row .input {
            margin-bottom: 0;
            background: #fff;
        }

        /* ── VIEWS ── */
        .view {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── LOADER & MESSAGES ── */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--g);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fdecea;
            color: #c62828;
            border: 1px solid #f9a8a8;
        }

        .alert-success {
            background: var(--g-light);
            color: var(--g);
            border: 1px solid var(--g-border);
        }

        /* ── REPORT PREVIEW ── */
        .overflow-x {
            overflow-x: auto;
            padding: 20px;
            background: #e0e0e0;
            border-radius: 8px;
            text-align: center;
        }

        .inline-block {
            display: inline-block;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        #qr-container img {
            border: none !important;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav class="nav">
        <div class="nav-brand">
            <svg width="22" height="16" viewBox="0 0 50 36">
                <rect x="2" y="22" width="7" height="13" fill="#4caf50" rx="1" />
                <rect x="12" y="14" width="7" height="21" fill="#4caf50" rx="1" />
                <rect x="22" y="8" width="7" height="27" fill="#4caf50" rx="1" />
                <rect x="32" y="16" width="7" height="19" fill="#4caf50" rx="1" />
                <rect x="42" y="4" width="7" height="31" fill="#4caf50" rx="1" />
            </svg>
            <span class="nav-brand-name">DRPEPTIDE</span>
        </div>
        <span class="badge">Firebase Admin</span>
    </nav>

    <div class="container">
        <div id="system-msg" class="alert alert-error"></div>

        <!-- VIEW: Form -->
        <div class="view active" id="view-form">
            <div class="card">
                <h2 style="font-weight:900; margin-bottom: 8px; font-size: 24px;">Generate New Report</h2>
                <p style="color:#666; margin-bottom: 30px; font-size: 14px;">Fill out the details below. This will be
                    saved to your Firebase database and a verifiable report will be generated.</p>

                <fieldset>
                    <legend>LAB INFORMATION</legend>
                    <div class="grid-3">
                        <div><label class="lbl">Lab Name</label><input class="input" id="f-labName" value="DRPEPTIDE" />
                        </div>
                        <div><label class="lbl">Lab Email</label><input class="input" id="f-labEmail"
                                value="info@drpeptide.com" /></div>
                        <div><label class="lbl">Lab Website</label><input class="input" id="f-labWeb"
                                value="www.drpeptide.com" /></div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>REPORT DETAILS</legend>
                    <div class="grid-3">
                        <div><label class="lbl">Testing Ordered</label><input type="date" class="input"
                                id="f-testingOrdered" /></div>
                        <div><label class="lbl">Sample Received</label><input type="date" class="input"
                                id="f-sampleReceived" /></div>
                        <div><label class="lbl">Analysis Date</label><input type="date" class="input"
                                id="f-analysisDate" /></div>
                    </div>
                    <div class="grid-2">
                        <div><label class="lbl">Client Name</label><input class="input" id="f-client"
                                placeholder="Client Name" /></div>
                        <div><label class="lbl">Sample ID</label><input class="input" id="f-sample"
                                placeholder="e.g. BPC-157 5mg" /></div>
                        <div><label class="lbl">Manufacturer</label><input class="input" id="f-manufacturer"
                                placeholder="Manufacturer Name" /></div>
                        <div><label class="lbl">Batch Number</label><input class="input" id="f-batch" value="Unknown" />
                        </div>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label class="lbl">Sample Description</label>
                        <textarea class="input" id="f-sampleDescription">See picture or pictures attached.</textarea>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label class="lbl">Tests Requested</label>
                        <textarea class="input" id="f-testsRequested">Assessment of a peptide vial or vials.</textarea>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label class="lbl">Comments (Optional)</label>
                        <textarea class="input" id="f-comments"></textarea>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>RESULTS</legend>
                    <div id="results-rows" style="margin-bottom: 16px;"></div>
                    <button class="btn-sec" onclick="addResultRow()">+ Add Result Row</button>
                </fieldset>

                <fieldset>
                    <legend>SIGNATURE (Optional)</legend>
                    <div style="display:flex;align-items:center;gap:16px;">
                        <input type="file" id="f-sig-upload" accept="image/png, image/jpeg" class="input"
                            style="width: auto; background: transparent; border: none; padding: 0;" />
                        <img id="f-sig-preview"
                            style="height:50px; display:none; border:1px solid #ddd; padding:2px; border-radius:4px; background:#fff;" />
                        <button class="btn-sec" id="f-sig-clear"
                            style="display:none; padding: 6px 12px; font-size: 12px;"
                            onclick="clearSig()">Remove</button>
                    </div>
                </fieldset>

                <div style="display: flex; justify-content: flex-end; border-top: 2px solid #eee; padding-top: 24px;">
                    <button class="btn" id="btn-generate" onclick="handleGenerate()">
                        <span class="loader" id="generate-loader"></span>
                        Save to Firebase & Generate
                    </button>
                </div>
            </div>
        </div>

        <!-- VIEW: Preview -->
        <div class="view" id="view-preview">
            <div class="card"
                style="margin-bottom: 20px; background: var(--g-light); border: 1px solid var(--g-border);">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                    <div>
                        <h2 style="color: var(--g); font-weight: 900; margin-bottom: 4px;">✅ Report Generated
                            Successfully</h2>
                        <div style="color: #444; font-size: 14px;">
                            Verification Key: <strong style="letter-spacing: 2px; font-size: 16px; color: #111;"
                                id="preview-key"></strong>
                            <span style="margin: 0 10px; color: #ccc;">|</span>
                            Task Number: <strong id="preview-task"></strong>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-sec" onclick="resetForm()">+ Create Another</button>
                        <button class="btn" id="btn-download" onclick="downloadReport()">⬇ Download JPG</button>
                    </div>
                </div>
            </div>

            <div class="overflow-x">
                <div class="inline-block" id="report-container"></div>
            </div>
        </div>

    </div>

    <!-- ══════════════ FIREBASE & LOGIC ══════════════ -->

                const data = {
                    labName: el('f-labName').value, labEmail: el('f-labEmail').value, labWeb: el('f-labWeb').value,
                    testingOrdered: el('f-testingOrdered').value, sampleReceived: el('f-sampleReceived').value, analysisDate: el('f-analysisDate').value,
                    client: el('f-client').value, sample: el('f-sample').value, manufacturer: el('f-manufacturer').value, batch: el('f-batch').value,
                    sampleDescription: el('f-sampleDescription').value, testsRequested: el('f-testsRequested').value, comments: el('f-comments').value,
                    results: State.results,
                    signature: State.signatureBase64,
                    createdAt: new Date().toISOString()
                };

                // Generate IDs & Save to Firestore
                const uniqueKey = genKey();
                const taskNumber = await getNextTaskNumber();
                const finalReport = { ...data, uniqueKey, taskNumber };

                await setDoc(doc(db, "reports", uniqueKey), finalReport);

                // Success - Render Preview
                State.generatedReport = finalReport;
                el('preview-key').textContent = uniqueKey;
                el('preview-task').textContent = "#" + taskNumber;

                renderVisualReport(finalReport);

                el('view-form').classList.remove('active');
                el('view-preview').classList.add('active');
                window.scrollTo(0, 0);

            } catch (err) {
                console.error(err);
                showError("Failed to save report: " + err.message);
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        }

        window.resetForm = function () {
            el('f-client').value = ""; el('f-sample').value = ""; el('f-manufacturer').value = "";
            el('f-batch').value = "Unknown"; el('f-comments').value = "";
            State.results = [{ label: "Purity", value: "" }];
            renderResults();
            // Pre-load default signature
            if (State.signatureBase64) {
                el("f-sig-preview").src = State.signatureBase64;
                el("f-sig-preview").style.display = "block";
                el("f-sig-clear").style.display = "block";
            }
            clearSig();
            el('view-preview').classList.remove('active');
            el('view-form').classList.add('active');
            window.scrollTo(0, 0);
        }

        // ── Download JPG Logic ──
        window.downloadReport = async function () {
            const btn = el('btn-download');
            btn.disabled = true; btn.textContent = "Processing...";

            try {
                const canvas = await html2canvas(el('report-inner-wrapper'), {
                    scale: 2, useCORS: true, allowTaint: true, backgroundColor: "#ffffff", logging: false
                });
                const link = document.createElement("a");
                link.download = `Report_${State.generatedReport.taskNumber}_${State.generatedReport.uniqueKey}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.95);
                link.click();
            } catch (e) {
                alert("Download failed. Ensure images (signatures) are CORS compliant.");
            }

            btn.disabled = false; btn.textContent = "⬇ Download JPG";
        }

        // ── HTML Template rendering (Matches original design exactly) ──
        const fmtShort = iso => { const d = new Date((iso || today()) + "T12:00:00"); const M = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"]; return `${String(d.getDate()).padStart(2, "0")} ${M[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`; }
        const fmtLong = iso => { const d = new Date((iso || today()) + "T12:00:00"); const M = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"]; return `${String(d.getDate()).padStart(2, "0")} ${M[d.getMonth()]} ${d.getFullYear()}`; }
        const logoSVG = `<svg width="44" height="32" viewBox="0 0 50 36" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="22" width="7" height="13" fill="#4caf50" rx="1"/><rect x="12" y="14" width="7" height="21" fill="#4caf50" rx="1"/><rect x="22" y="8" width="7" height="27" fill="#4caf50" rx="1"/><rect x="32" y="16" width="7" height="19" fill="#4caf50" rx="1"/><rect x="42" y="4" width="7" height="31" fill="#4caf50" rx="1"/></svg>`;

        function renderVisualReport(r) {
            const sigHTML = r.signature
                ? `<img src="${r.signature}" alt="Signature" style="height:72px;width:auto;object-fit:contain;display:block;" />`
                : `<span style="font-size:13px;color:#bbb;font-style:italic;">—</span>`;

            const clientRows = [["Client", r.client], ["Sample", r.sample], ["Manufacturer", r.manufacturer], ["Batch", r.batch]]
                .map(([lbl, val], i) => `<tr style="background:${i % 2 === 0 ? "#f9f9f9" : "#fff"};"><td style="color:#4caf50;font-weight:500;padding:8px 16px;width:140px;">${lbl}</td><td style="padding:8px 16px;color:#222;font-weight:400;">${esc(val)}</td></tr>`).join("");

            const resRows = (r.results || []).map(res => `<tr style="border-bottom:1px solid #d4efd4;"><td style="padding:9px 16px;color:#222;width:58%;font-weight:400;">${esc(res.label)}</td><td style="padding:9px 16px;color:#222;font-weight:400;">${esc(res.value)}</td></tr>`).join("");

            const html = `
    <div id="report-inner-wrapper" style="font-family:'Jost','Trebuchet MS',sans-serif;width:794px;background:#fff;padding:52px 64px 44px;box-sizing:border-box;color:#222;line-height:1.5;">
      <!-- HEADER -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;margin-bottom:24px;border-bottom:2.5px solid #4caf50;">
        <div style="display:flex;align-items:center;gap:24px;">
          <span style="font-size:36px;font-weight:900;color:#4caf50;letter-spacing:0.5px;line-height:1;">TEST REPORT</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            ${logoSVG}
            <span style="font-size:10.5px;font-weight:900;color:#1a1a1a;letter-spacing:5px;">${esc(r.labName)}</span>
          </div>
        </div>
        <div style="text-align:right;font-size:11.5px;color:#444;line-height:2;font-weight:400;">
          <div>E-mail:&nbsp; ${esc(r.labEmail)}</div><div>Web:&nbsp;&nbsp;&nbsp; ${esc(r.labWeb)}</div>
        </div>
      </div>
      <!-- TASK + DATES -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;">
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="color:#4caf50;font-size:15px;font-weight:500;">Task Number</span>
          <span style="background:#f0f0f0;padding:4px 18px;border-radius:3px;font-size:15px;font-weight:700;letter-spacing:0.3px;">#${r.taskNumber}</span>
        </div>
        <div style="text-align:right;font-size:14px;line-height:2.1;font-weight:400;">
          <div><span style="color:#4caf50;">Testing ordered</span><span style="color:#bbb;margin:0 8px;">&gt;</span><strong>${fmtShort(r.testingOrdered)}</strong></div>
          <div><span style="color:#4caf50;">Sample received</span><span style="color:#bbb;margin:0 8px;">&gt;</span><strong>${fmtShort(r.sampleReceived)}</strong></div>
        </div>
      </div>
      <!-- CLIENT TABLE -->
      <table style="width:100%;border-collapse:collapse;margin-bottom:30px;font-size:14px;"><tbody>${clientRows}</tbody></table>
      <!-- DESC -->
      <div style="margin-bottom:22px;"><div style="color:#4caf50;font-weight:500;font-size:14px;margin-bottom:6px;">Sample description &gt;</div><div style="background:#f7f7f7;padding:12px 16px;font-size:13.5px;color:#444;min-height:72px;line-height:1.6;">${esc(r.sampleDescription)}</div></div>
      <div style="margin-bottom:22px;"><div style="color:#4caf50;font-weight:500;font-size:14px;margin-bottom:6px;">Tests requested &gt;</div><div style="background:#f7f7f7;padding:12px 16px;font-size:13.5px;color:#444;min-height:72px;line-height:1.6;">${esc(r.testsRequested)}</div></div>
      <!-- RESULTS -->
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="color:#4caf50;font-weight:500;font-size:14px;">Results &gt;</span>
          <div id="qr-container"></div>
        </div>
        <table style="width:100%;border-collapse:collapse;border:1.5px solid #b8e6b8;font-size:14px;"><tbody>${resRows}<tr><td style="padding:9px 16px;"></td><td></td></tr></tbody></table>
      </div>
      <!-- COMMENTS -->
      <div style="margin-bottom:22px;"><div style="color:#4caf50;font-weight:500;font-size:14px;margin-bottom:6px;">Comments &gt;</div><div style="background:#f7f7f7;padding:12px 16px;font-size:13.5px;color:#444;min-height:68px;line-height:1.6;">${esc(r.comments)}</div></div>
      <!-- FOOTER -->
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;margin-top:8px;">
        <div style="font-size:14px;"><span style="color:#4caf50;">Analysis conducted</span><span style="color:#bbb;margin:0 8px;">&gt;</span><span style="background:#f0f0f0;padding:4px 16px;border-radius:3px;font-weight:700;font-size:15px;">${fmtLong(r.analysisDate)}</span></div>
        <div style="display:flex;align-items:center;gap:12px;font-size:14px;"><span style="color:#4caf50;">Signature &gt;</span>${sigHTML}</div>
      </div>
      <!-- VERIFY -->
      <div style="border-top:1px solid #e0e0e0;padding-top:18px;">
        <div style="font-size:13px;color:#4caf50;margin-bottom:10px;font-weight:400;">Verify this test at <strong>${esc(r.labWeb)}/verify/</strong> with the following unique key</div>
        <div style="text-align:center;font-size:16px;font-weight:700;letter-spacing:3.5px;color:#222;background:#f5f5f5;padding:13px 0;border-radius:3px;">${r.uniqueKey}</div>
      </div>
    </div>`;

            el('report-container').innerHTML = html;

            // Generate QR
            if (typeof QRCode !== "undefined") {
                new QRCode(el("qr-container"), {
                    text: `https://${r.labWeb}/verify/${r.uniqueKey}`,
                    width: 54, height: 54, colorDark: "#1a1a1a", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M,
                });
            }
        }
    </script>

</body>

</html>
